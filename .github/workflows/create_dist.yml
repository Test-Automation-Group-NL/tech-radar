name: Deploy to WordPress

on:
  push:
    branches: ['master']
  workflow_dispatch:
    inputs:
      deploy-radar:
        description: 'Force deploy radar.json'
        type: boolean
        default: false
      deploy-theme:
        description: 'Force deploy WordPress theme'
        type: boolean
        default: false
      deploy-plugin:
        description: 'Force deploy WordPress plugin'
        type: boolean
        default: false

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      radar: ${{ steps.filter.outputs.radar }}
      theme: ${{ steps.filter.outputs.theme }}
      plugin: ${{ steps.filter.outputs.plugin }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            radar:
              - 'radar/content/**'
              - 'radar/build.radar.json.js'
            theme:
              - 'wp-theme/**'
            plugin:
              - 'src/**'
              - 'wp-plugin-radar/**'
              - '!wp-plugin-radar/assets/dist/**'

  build:
    needs: detect-changes
    if: needs.detect-changes.outputs.plugin == 'true' || github.event.inputs.deploy-plugin == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Build plugin assets
        run: npm run build
      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: plugin-dist
          path: wp-plugin-radar/assets/dist/
          retention-days: 1

  deploy-radar-json:
    needs: detect-changes
    if: needs.detect-changes.outputs.radar == 'true' || github.event.inputs.deploy-radar == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Generate radar.json
        run: npm run radar:generate-json:prod
      - name: Upload radar.json via FTP
        run: |
          curl --silent --show-error --ftp-create-dirs \
            -T standalone/radar.json \
            "ftp://${{ secrets.FTP_SERVER }}/${{ secrets.FTP_RADAR_PATH }}" \
            -u "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}"

  deploy-theme:
    needs: detect-changes
    if: needs.detect-changes.outputs.theme == 'true' || github.event.inputs.deploy-theme == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy theme via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: wp-theme/
          server-dir: ${{ secrets.FTP_THEME_PATH }}
          exclude: |
            **/.git*
            **/.git*/**
            **/CLAUDE.md
            **/.DS_Store

  deploy-plugin:
    needs: [detect-changes, build]
    if: needs.detect-changes.outputs.plugin == 'true' || github.event.inputs.deploy-plugin == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: plugin-dist
          path: wp-plugin-radar/assets/dist/
      - name: Deploy plugin via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: wp-plugin-radar/
          server-dir: ${{ secrets.FTP_PLUGIN_PATH }}
          exclude: |
            **/.git*
            **/.git*/**
            **/CLAUDE.md
            **/.DS_Store
            **/assets/dist/.gitkeep
