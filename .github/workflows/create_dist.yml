name: Deploy to WordPress

on:
  push:
    branches: ['master']
  workflow_dispatch:
    inputs:
      deploy-radar:
        description: 'Force deploy radar.json'
        type: boolean
        default: false
      deploy-theme:
        description: 'Force deploy WordPress theme'
        type: boolean
        default: false
      deploy-plugin:
        description: 'Force deploy WordPress plugin'
        type: boolean
        default: false

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      radar: ${{ steps.filter.outputs.radar }}
      theme: ${{ steps.filter.outputs.theme }}
      plugin: ${{ steps.filter.outputs.plugin }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            radar:
              - 'radar/content/**'
              - 'radar/build.radar.json.js'
            theme:
              - 'wp-theme/**'
              - '!wp-theme/assets/dist/**'
            plugin:
              - 'src/**'
              - 'wp-plugin-radar/**'
              - '!wp-plugin-radar/assets/dist/**'

  build:
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.theme == 'true' ||
      needs.detect-changes.outputs.plugin == 'true' ||
      github.event.inputs.deploy-theme == 'true' ||
      github.event.inputs.deploy-plugin == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Build plugin and theme assets
        run: npm run build
      - name: Upload plugin dist
        uses: actions/upload-artifact@v7
        with:
          name: plugin-dist
          path: wp-plugin-radar/assets/dist/
          retention-days: 1
      - name: Upload theme dist
        uses: actions/upload-artifact@v7
        with:
          name: theme-dist
          path: wp-theme/assets/dist/
          retention-days: 1

  deploy-radar-json:
    needs: detect-changes
    if: needs.detect-changes.outputs.radar == 'true' || github.event.inputs.deploy-radar == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Generate radar.json
        run: npm run radar:generate-json:prod
      - name: Install lftp
        run: sudo apt-get install -y lftp
      - name: Upload radar.json via FTP
        run: |
          lftp -c "
            set ftp:ssl-allow yes; set ssl:verify-certificate no;
            open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} ${{ secrets.FTP_SERVER }};
            put standalone/radar.json -o ${{ secrets.FTP_RADAR_PATH }};
            quit
          "

  deploy-theme:
    needs: [detect-changes, build]
    if: needs.detect-changes.outputs.theme == 'true' || github.event.inputs.deploy-theme == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install lftp
        run: sudo apt-get install -y lftp
      - name: Download theme dist
        uses: actions/download-artifact@v8
        with:
          name: theme-dist
          path: wp-theme/assets/dist/
      - name: Deploy theme via FTP
        run: |
          lftp -c "
            set ftp:ssl-allow yes; set ssl:verify-certificate no;
            open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} ${{ secrets.FTP_SERVER }};
            mirror --reverse --delete --no-perms \
              --exclude-glob CLAUDE.md \
              --exclude-glob .DS_Store \
              --exclude-glob .gitkeep \
              wp-theme/ ${{ secrets.FTP_THEME_PATH }};
            quit
          "

  deploy-plugin:
    needs: [detect-changes, build]
    if: needs.detect-changes.outputs.plugin == 'true' || github.event.inputs.deploy-plugin == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install lftp
        run: sudo apt-get install -y lftp
      - name: Download plugin dist
        uses: actions/download-artifact@v8
        with:
          name: plugin-dist
          path: wp-plugin-radar/assets/dist/
      - name: Deploy plugin via FTP
        run: |
          lftp -c "
            set ftp:ssl-allow yes; set ssl:verify-certificate no;
            open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} ${{ secrets.FTP_SERVER }};
            mirror --reverse --delete --no-perms \
              --exclude-glob CLAUDE.md \
              --exclude-glob .DS_Store \
              --exclude-glob .gitkeep \
              wp-plugin-radar/ ${{ secrets.FTP_PLUGIN_PATH }};
            quit
          "
