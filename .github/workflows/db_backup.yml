name: Weekly Database Backup

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC
  workflow_dispatch:

jobs:
  db-backup:
    runs-on: ubuntu-latest
    steps:
      - name: Export database and email via WordPress
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            WP_PATH="${{ secrets.WP_PATH }}"
            BACKUP_FILE="/tmp/techradar-db-$(date +%Y%m%d).sql.gz"

            # Export and compress the database
            wp --path="$WP_PATH" db export - | gzip > "$BACKUP_FILE"

            # Send via wp_mail and clean up
            wp --path="$WP_PATH" eval "
              \$file = '$BACKUP_FILE';
              \$date = date('Y-m-d');
              \$sent = wp_mail(
                'info@testautomationtechradar.com',
                'Tech Radar DB Backup - ' . \$date,
                'Weekly WordPress database backup attached.',
                array(),
                array(\$file)
              );
              echo \$sent ? 'Email sent.' : 'Email failed.';
              unlink(\$file);
            "
